# =============================================================================
# Chunking + Retrieval Pipeline Configuration
# Vietnamese Legal RAG System (VBQPPL)
# =============================================================================

# ---------------------------------------------------------------------------
# Chunking parameters (Section 3 & 4 of Pipeline.md)
# ---------------------------------------------------------------------------
chunking:
  # Maximum tokens per chunk before recursive splitting
  # Model has 8194 context window — 1024 balances context vs granularity
  max_tokens: 1024
  
  # Minimum tokens per chunk; shorter chunks merged with adjacent ones
  min_tokens: 30
  
  # Token overlap for sliding-window fallback (prevents splitting at boundaries)
  overlap_tokens: 50

# ---------------------------------------------------------------------------
# Embedding model (Section 7 of Pipeline.md)
# ---------------------------------------------------------------------------
embedding:
  # sentence-transformers model name
  # AITeamVN/Vietnamese_Embedding: 1024-dim, 2048-token context, BGE-M3 backbone
  #   Zalo Legal benchmark: Acc@1=0.727, MRR@10=0.818
  # Alternatives:
  #   "tutran27/vietnamese-legal-phapdien-embedding-v1" — 1024-dim, 768-token, legal-only
  #   "BAAI/bge-m3" — 1024-dim, 8194-token, multilingual (no VI fine-tune)
  #   "keepitreal/vietnamese-sbert" — 768-dim, 256-token, PhoBERT (too short)
  model_name: "AITeamVN/Vietnamese_Embedding"
  
  # Batch size for embedding generation (lower for 1024-dim models on CPU)
  batch_size: 16
  
  # Device: "cpu", "cuda", or "auto" (auto-detects GPU)
  device: "cpu"

# ---------------------------------------------------------------------------
# Vector database (Section 8 of Pipeline.md)
# ---------------------------------------------------------------------------
vector_store:
  # Backend type (only "chromadb" supported currently)
  type: "chromadb"
  
  # Path to persist ChromaDB data
  path: "./chroma_db"
  
  # Collection name within ChromaDB
  collection_name: "vbqppl_legal_chunks"

# ---------------------------------------------------------------------------
# Query rewriting (Section 9 of Pipeline.md)
# ---------------------------------------------------------------------------
query_rewriter:
  # Enable query normalization
  enabled: true
  
  # Expand Vietnamese legal abbreviations (dk → điều kiện, vbpl → văn bản pháp luật)
  expand_abbreviations: true
  
  # Append legal-domain context phrase for short queries
  append_context: true
  context_phrase: "theo pháp luật hiện hành"

# ---------------------------------------------------------------------------
# BM25 sparse retrieval (Section 10 enhancement)
# ---------------------------------------------------------------------------
bm25:
  # Enable BM25 + Vector hybrid retrieval
  enabled: true
  
  # Number of candidates from BM25 to fuse with vector results
  top_k: 20
  
  # k1 parameter: term frequency saturation (1.2–2.0 typical)
  k1: 1.5
  
  # b parameter: document length normalization (0.75 typical)
  b: 0.75
  
  # Weight for BM25 scores in hybrid fusion (0.0 = pure vector, 1.0 = pure BM25)
  fusion_weight: 0.5
  
  # Path to persist BM25 index (relative to config.yaml)
  index_path: "./chroma_db/bm25_index.pkl"

# ---------------------------------------------------------------------------
# Retrieval parameters (Section 10 of Pipeline.md)
# ---------------------------------------------------------------------------
retrieval:
  # Number of top chunks to return from vector search
  top_k: 10
  
  # Minimum cosine similarity threshold (0.0 = keep all, let reranker decide)
  similarity_threshold: 0.0
  
  # Enable metadata post-filtering (status, effectiveDate, topic)
  enable_metadata_filtering: true
  
  # Enable graph expansion via article references
  enable_graph_expansion: true
  
  # Max articles to pull in via reference expansion
  expansion_max_articles: 5
  
  # Weight factors for hybrid scoring
  vector_weight: 0.7
  metadata_boost: 0.2
  graph_boost: 0.1

# ---------------------------------------------------------------------------
# Reranker (Section 11 of Pipeline.md)
# ---------------------------------------------------------------------------
reranker:
  # Enable post-retrieval reranking
  enabled: true
  
  # MMR lambda: 1.0 = pure relevance, 0.0 = pure diversity
  lambda_mmr: 0.7
  
  # Weight for keyword overlap bonus
  keyword_boost: 0.15
  
  # Weight for diversity penalty
  diversity_weight: 0.15

# ---------------------------------------------------------------------------
# Context generation (Section 5 of Pipeline.md)
# ---------------------------------------------------------------------------
context:
  # Whether to prepend article-level context to each chunk
  enabled: true
  
  # Use LLM for context generation (true) or heuristic fallback (false)
  use_llm: false
  
  # Target context length in tokens (60-120 recommended)
  max_context_tokens: 100

# ---------------------------------------------------------------------------
# Data source
# ---------------------------------------------------------------------------
data:
  # Directory containing parsed JSON files (relative to this config file)
  path: "../data"

# ---------------------------------------------------------------------------
# Metadata filtering preferences
# ---------------------------------------------------------------------------
metadata:
  # Boost chunks from ACTIVE/valid documents
  prefer_active: true
  
  # Boost chunks matching the query's implied topic
  topic_boost: true
