# =============================================================================
# Chunking + Retrieval Pipeline Configuration
# Vietnamese Legal RAG System (VBQPPL)
# =============================================================================

# ---------------------------------------------------------------------------
# Chunking parameters (Section 3 & 4 of Pipeline.md)
# ---------------------------------------------------------------------------
chunking:
  # Maximum tokens per chunk before recursive splitting
  # Model has 8194 context window — 1024 balances context vs granularity
  max_tokens: 512
  
  # Minimum tokens per chunk; shorter chunks merged with adjacent ones
  min_tokens: 30
  
  # Token overlap for sliding-window fallback (prevents splitting at boundaries)
  overlap_tokens: 50

# ---------------------------------------------------------------------------
# Embedding model (Section 7 of Pipeline.md)
# ---------------------------------------------------------------------------
api:
  # OpenAI-compatible base URL (shared by embedding + LLM)
  base_url: "https://mkp-api.fptcloud.com"
  # API key (set env var FPT_API_KEY for embedding + LLM)
  api_key: "${FPT_API_KEY}"

embedding:
  # Backend: "local" (sentence-transformers) or "api" (company embedding API)
  backend: "api"
  
  # Local backend settings (used when backend: "local")
  model_name: "AITeamVN/Vietnamese_Embedding"
  batch_size: 16
  device: "cpu"
  
  # API backend settings (used when backend: "api")
  api:
    # Model name to pass to the API
    model: "Vietnamese_Embedding"
    # Max tokens per input (API model supports 2048)
    max_seq_length: 2048
    # Batch size for API calls
    batch_size: 64
    # Request timeout in seconds
    timeout_sec: 60

# ---------------------------------------------------------------------------
# Vector database (Section 8 of Pipeline.md)
# ---------------------------------------------------------------------------
vector_store:
  # Backend type (only "chromadb" supported currently)
  type: "chromadb"
  
  # Path to persist ChromaDB data
  path: "./chroma_db"
  
  # Collection name within ChromaDB
  collection_name: "vbqppl_legal_chunks"

# ---------------------------------------------------------------------------
# Query rewriting (Section 9 of Pipeline.md)
# ---------------------------------------------------------------------------
query_rewriter:
  # Enable query normalization
  enabled: false
  
  # Expand Vietnamese legal abbreviations (dk → điều kiện, vbpl → văn bản pháp luật)
  expand_abbreviations: true
  
  # Append legal-domain context phrase for short queries
  append_context: true
  context_phrase: "theo pháp luật hiện hành"

# ---------------------------------------------------------------------------
# BM25 sparse retrieval (Section 10 enhancement)
# ---------------------------------------------------------------------------
bm25:
  # Enable BM25 + Vector hybrid retrieval
  enabled: false

  # Number of candidates from BM25 to fuse with vector results
  # Recommend matching retrieval.candidate_pool_size for best recall
  top_k: 50
  
  # k1 parameter: term frequency saturation (1.2–2.0 typical)
  k1: 1.2
  
  # b parameter: document length normalization (0.75 typical)
  b: 0.75
  
  # Weight for BM25 scores in hybrid fusion (0.0 = pure vector, 1.0 = pure BM25)
  fusion_weight: 0.04

  # Fusion method: "weighted" (weighted score blend) or "rrf" (reciprocal rank fusion)
  fusion_method: "weighted"

  # RRF parameters (used when fusion_method = "rrf")
  rrf_k: 60
  rrf_vector_weight: 1.0
  rrf_bm25_weight: 1.0

  # Path to persist BM25 index (relative to config.yaml)
  index_path: "./chroma_db/bm25_index.pkl"

# ---------------------------------------------------------------------------
# Retrieval parameters (Section 10 of Pipeline.md)
# ---------------------------------------------------------------------------
retrieval:
  # Number of top chunks to return from vector search
  top_k: 10

  # Number of candidates to retrieve before fusion + reranking
  # Larger pool improves recall@1/3 at minor latency cost
  candidate_pool_size: 50

  # Minimum cosine similarity threshold (0.0 = keep all, let reranker decide)
  similarity_threshold: 0.0

  # Enable metadata post-filtering (status, effectiveDate, topic)
  enable_metadata_filtering: false

  # Weight factors for hybrid scoring
  vector_weight: 1
  metadata_boost: 0

# ---------------------------------------------------------------------------
# Reranker (Section 11 of Pipeline.md)
# ---------------------------------------------------------------------------
reranker:
  # Enable API reranking after vector+BM25 retrieval
  enabled: false

  # Reranker mode: "bge_api" (BGE reranker) or "llm_api" (Gemma selection)
  mode: "bge_api"

  bge:
    # Model name passed to the reranker API
    model: "bge-reranker-v2-m3"

    # Reranker API key (separate from embedding key, via env var)
    api_key: "${FPT_RERANKER_API_KEY}"

    # Uses the same api.base_url as the embedding API
    endpoint: "/v1/rerank"

    # Number of retrieved candidates to send to the reranker
    max_candidates: 10

    # Number of reranked results returned by the API
    top_n: 10

    # Request timeout in seconds
    timeout_sec: 120

    # Blend weight: 1.0 = pure BGE score, 0.8 = 80% BGE + 20% hybrid score
    blend_weight: 0.05

    conditional:
      # If false, always call BGE when reranker.enabled=true
      enabled: true

      # "top1_top2_gap" reranks only when rank 1 and rank 2 are close.
      # "top1_top10_gap" reranks only when the top 10 are tightly packed.
      strategy: "top1_top10_gap"

      # If top1_score - top2_score < threshold, call BGE
      top1_top2_gap: 0.03

      # Used only with strategy: "top1_top10_gap"
      top1_top10_gap: 0.08

      min_candidates: 2

  # -----------------------------------------------------------------------
  # LLM reranker (Gemma) — used when reranker.mode: "llm_api"
  # -----------------------------------------------------------------------
  llm:
    # Model name
    model: "gemma-4-31B-it"

    # Chat completions endpoint
    endpoint: "/v1/chat/completions"

    # Number of top candidates to send to the LLM
    max_candidates: 3

    # Number of reranked results to keep
    top_n: 3

    # Sampling temperature (0.0 = deterministic)
    temperature: 0.0

    # Max output tokens for the JSON response
    max_output_tokens: 48

    # Max characters per candidate document sent to the LLM
    max_candidate_chars: 1000

    # Blend weight (1.0 = pure LLM selection)
    blend_weight: 1.0

    # Request timeout in seconds
    timeout_sec: 60

    conditional:
      # If false, always call LLM when reranker.enabled=true
      enabled: false

      # "top1_top2_gap" reranks only when rank 1 and rank 2 are close
      strategy: "top1_top2_gap"

      # If top1_score - top2_score < threshold, call LLM
      top1_top2_gap: 0.03

      top1_top10_gap: 0.08

      min_candidates: 2

# ---------------------------------------------------------------------------
# Context generation (Section 5 of Pipeline.md)
# ---------------------------------------------------------------------------
context:
  # Whether to prepend article-level context to each chunk
  enabled: true
  
  # Use LLM for context generation (true) or heuristic fallback (false)
  use_llm: false
  
  # Target context length in tokens (60-120 recommended)
  max_context_tokens: 100
  
  # LLM API settings (used when use_llm: true)
  llm:
    # Model name
    model: "gemma-4-31B-it"
    # Sampling temperature
    temperature: 0.3
    # Max output tokens for the summary
    max_output_tokens: 120
    # Request timeout in seconds
    timeout_sec: 30

# ---------------------------------------------------------------------------
# Data source
# ---------------------------------------------------------------------------
data:
  # Directory containing parsed JSON files (relative to this config file)
  path: "../data/phap_dien_dataset_45_chu_de"

# ---------------------------------------------------------------------------
# Metadata filtering preferences
# ---------------------------------------------------------------------------
metadata:
  # Boost chunks from ACTIVE/valid documents
  prefer_active: false
  
  # Boost chunks matching the query's implied topic
  topic_boost: false
